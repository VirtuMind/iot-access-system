<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Schema fonctionnel du systeme de gestion des acces et presence a domicile</title>
  <desc id="desc">Diagramme en couches montrant les capteurs, l'ESP32, les sorties locales et la supervision Blynk.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f3b57"/>
    </marker>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #536274; }
      .layer { fill: #ffffff; stroke: #d5dde8; stroke-width: 2; rx: 18; }
      .layer-title { font: 700 18px Arial, sans-serif; fill: #1f3b57; letter-spacing: .4px; }
      .box { fill: #eef4fb; stroke: #b9c9dc; stroke-width: 1.5; rx: 10; }
      .box2 { fill: #eff8f3; stroke: #acd2b8; stroke-width: 1.5; rx: 10; }
      .box3 { fill: #fff5e7; stroke: #e0bd7c; stroke-width: 1.5; rx: 10; }
      .box4 { fill: #f0efff; stroke: #bcb7e8; stroke-width: 1.5; rx: 10; }
      .label { font: 700 16px Arial, sans-serif; fill: #172033; }
      .small { font: 400 13px Arial, sans-serif; fill: #536274; }
      .arrow { stroke: #1f3b57; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #708296; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
      .pill { fill: #1f3b57; rx: 12; }
      .pill-text { font: 700 14px Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="720"/>
  <text class="title" x="64" y="58">Schema fonctionnel - Gestion des acces et presence a domicile</text>
  <text class="subtitle" x="64" y="88">Vue logique du flux d'information : acquisition, traitement ESP32, sorties locales et supervision IoT.</text>

  <rect class="layer" x="54" y="130" width="270" height="480"/>
  <text class="layer-title" x="84" y="166">1. Acquisition</text>
  <rect class="box" x="84" y="196" width="210" height="68"/>
  <text class="label" x="106" y="222">PIR - GPIO14</text>
  <text class="small" x="106" y="244">Mouvement zone entree</text>
  <rect class="box" x="84" y="286" width="210" height="76"/>
  <text class="label" x="106" y="313">HC-SR04</text>
  <text class="small" x="106" y="335">TRIG GPIO5 / ECHO GPIO18</text>
  <text class="small" x="106" y="353">Distance salon</text>
  <rect class="box" x="84" y="384" width="210" height="68"/>
  <text class="label" x="106" y="410">DHT22 - GPIO4</text>
  <text class="small" x="106" y="432">Temperature salon</text>
  <rect class="box" x="84" y="474" width="210" height="68"/>
  <text class="label" x="106" y="500">Bouton - GPIO13</text>
  <text class="small" x="106" y="522">Sonnette simulee</text>

  <rect class="layer" x="380" y="130" width="300" height="480"/>
  <text class="layer-title" x="410" y="166">2. Traitement ESP32</text>
  <rect class="box2" x="414" y="198" width="232" height="80"/>
  <text class="label" x="438" y="226">Fusion capteurs</text>
  <text class="small" x="438" y="248">PIR = 1 ET distance &lt; 200 cm</text>
  <rect class="box2" x="414" y="304" width="232" height="90"/>
  <text class="label" x="438" y="332">Machine d'etats</text>
  <text class="small" x="438" y="354">Vide, occupe, visiteur,</text>
  <text class="small" x="438" y="374">absence prolongee</text>
  <rect class="box2" x="414" y="420" width="232" height="76"/>
  <text class="label" x="438" y="448">Gestion du temps</text>
  <text class="small" x="438" y="470">millis(), delais, anti-blocage</text>
  <rect class="box2" x="414" y="522" width="232" height="52"/>
  <text class="label" x="438" y="554">Journal des evenements</text>

  <rect class="layer" x="736" y="130" width="220" height="480"/>
  <text class="layer-title" x="766" y="166">3. Sorties locales</text>
  <rect class="box3" x="766" y="198" width="160" height="58"/>
  <text class="label" x="788" y="223">LCD I2C</text>
  <text class="small" x="788" y="242">Etat + derniere detection</text>
  <rect class="box3" x="766" y="282" width="160" height="58"/>
  <text class="label" x="788" y="307">LED verte</text>
  <text class="small" x="788" y="326">Logement occupe</text>
  <rect class="box3" x="766" y="366" width="160" height="58"/>
  <text class="label" x="788" y="391">LED bleue</text>
  <text class="small" x="788" y="410">Visiteur detecte</text>
  <rect class="box3" x="766" y="450" width="160" height="58"/>
  <text class="label" x="788" y="475">Buzzer</text>
  <text class="small" x="788" y="494">Sonnette / alerte</text>

  <rect class="layer" x="1012" y="130" width="214" height="480"/>
  <text class="layer-title" x="1042" y="166">4. Supervision IoT</text>
  <rect class="box4" x="1042" y="198" width="154" height="58"/>
  <text class="label" x="1062" y="223">Wi-Fi</text>
  <text class="small" x="1062" y="242">Wokwi-GUEST</text>
  <rect class="box4" x="1042" y="282" width="154" height="58"/>
  <text class="label" x="1062" y="307">Dashboard</text>
  <text class="small" x="1062" y="326">Etat, T, distance</text>
  <rect class="box4" x="1042" y="366" width="154" height="58"/>
  <text class="label" x="1062" y="391">Notifications</text>
  <text class="small" x="1062" y="410">Visiteur / alerte</text>
  <rect class="box4" x="1042" y="450" width="154" height="58"/>
  <text class="label" x="1062" y="475">Historique</text>
  <text class="small" x="1062" y="494">10 derniers evenements</text>

  <path class="arrow" d="M324 370 L378 370"/>
  <path class="arrow" d="M680 370 L734 370"/>
  <path class="arrow" d="M956 370 L1010 370"/>
  <path class="thin" d="M530 198 C530 125, 1119 125, 1119 196"/>
  <rect class="pill" x="456" y="636" width="368" height="32"/>
  <text class="pill-text" x="480" y="657">Regle principale : presence = mouvement + proximite</text>
</svg>

